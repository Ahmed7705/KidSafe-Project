<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blocked by KidSafe</title>
    <link rel="stylesheet" href="blocked.css" />
  </head>
  <body>
    <div class="page">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="cloud cloud-3"></div>
      <div class="star star-1"></div>
      <div class="star star-2"></div>
      <div class="star star-3"></div>

      <div class="card">
        <div class="hero">
          <div class="mascot">
            <div class="badge">KS</div>
            <div class="face">
              <span class="eye"></span>
              <span class="eye"></span>
              <span class="smile"></span>
            </div>
          </div>
          <div class="hero-text">
            <h1>Oops! This page is not for kids yet.</h1>
            <p class="lead">KidSafe is helping you stay safe and happy online.</p>
          </div>
        </div>

        <div class="bubble">
          <p>Try a different site or ask a parent to unlock this page.</p>
        </div>

        <div class="actions">
          <button id="go-back" class="primary">Go back</button>
        </div>

        <p class="tiny" id="blocked-url"></p>
      </div>
    </div>
    <script src="blocked.js"></script>
  </body>
</html>
